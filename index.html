<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Calidad</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animación para el estado de "Escuchando" del micrófono */
        .recording {
            animation: pulse-red 1.5s infinite;
            color: #ef4444;
            /* text-red-500 */
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-lg border border-gray-100 p-6 sm:p-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-center text-gray-800 mb-6">Control de Calidad</h1>

        <form id="qa-form" class="space-y-5">
            <!-- Campo: Lote -->
            <div>
                <label for="lote" class="block text-sm font-semibold text-gray-700 mb-1">Lote</label>
                <input type="text" id="lote" name="lote" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                    placeholder="Ej. L-4092">
            </div>

            <!-- Campo: Tipo de Tela -->
            <div>
                <label for="tipoTela" class="block text-sm font-semibold text-gray-700 mb-1">Tipo de Tela</label>
                <select id="tipoTela" name="tipoTela" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200 cursor-pointer appearance-none">
                    <option value="" disabled selected>Seleccione un tipo...</option>
                    <option value="Algodon">Algodón</option>
                    <option value="Poliester">Poliéster</option>
                    <option value="Lino">Lino</option>
                    <option value="Seda">Seda</option>
                    <option value="Mezcla">Mezcla</option>
                </select>
            </div>

            <!-- Campo: Defecto (Con ícono de micrófono a la derecha) -->
            <div>
                <label for="defecto" class="block text-sm font-semibold text-gray-700 mb-1">Defecto</label>
                <div class="relative flex items-center">
                    <input type="text" id="defecto" name="defecto" required
                        class="w-full pl-4 pr-12 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                        placeholder="Describa el defecto encontrado...">

                    <button type="button" id="btn-dictado"
                        class="absolute right-2 p-2 text-gray-400 hover:text-blue-500 transition-colors focus:outline-none rounded-full hover:bg-gray-100"
                        title="Dictar por voz">
                        <!-- Ícono SVG Simple de Micrófono -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor" class="w-5 h-5 transition-transform duration-200" id="mic-icon">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Campo: Severidad -->
            <div>
                <label for="severidad" class="block text-sm font-semibold text-gray-700 mb-1">Severidad</label>
                <select id="severidad" name="severidad" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200 cursor-pointer appearance-none">
                    <option value="" disabled selected>Seleccione severidad...</option>
                    <option value="Baja">Baja</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                    <option value="Critica">Crítica</option>
                </select>
            </div>

            <!-- Campo: Usuario -->
            <div>
                <label for="usuario" class="block text-sm font-semibold text-gray-700 mb-1">Usuario</label>
                <input type="text" id="usuario" name="usuario" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-200"
                    placeholder="Ej. Juan Pérez">
            </div>

            <!-- Botón de Envío y Mensaje de Estado -->
            <div class="pt-4">
                <button type="submit" id="btn-submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 flex justify-center items-center gap-2">
                    <!-- Ícono de enviar -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                    </svg>
                    Enviar Registro
                </button>
                <p id="status-message"
                    class="text-center mt-4 text-sm font-semibold hidden opacity-0 transition-opacity duration-300"></p>
            </div>
        </form>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE URL ---
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxxdTs0WEhOYQhnRJYYwYVKs-h1WqI4ixwjTzXol8V-xaCkK7ANCLkAmYo5I31GACc/exec';

        // --- 2. LÓGICA DE DICTADO POR VOZ (Web Speech API) ---
        const btnDictado = document.getElementById('btn-dictado');
        const inputDefecto = document.getElementById('defecto');
        const micIcon = document.getElementById('mic-icon');

        let recognition = null;

        // Verificar si el navegador soporta dictado por voz
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();

            recognition.continuous = false; // Finaliza al dejar de hablar
            recognition.interimResults = false; // Solo resultados finales
            recognition.lang = 'es-ES'; // Lenguaje español

            // Eventos del reconocimiento de voz
            recognition.onstart = function () {
                micIcon.classList.add('recording');
                inputDefecto.placeholder = 'Escuchando... hable ahora.';
            };

            recognition.onresult = function (event) {
                const dictado = event.results[0][0].transcript;
                const valorActual = inputDefecto.value.trim();
                // Añadir un espacio si ya hay texto
                inputDefecto.value = valorActual ? `${valorActual} ${dictado}` : dictado;
            };

            recognition.onerror = function (event) {
                console.error("Error al reconocer la voz:", event.error);
                micIcon.classList.remove('recording');
                inputDefecto.placeholder = 'Describa el defecto encontrado...';
            };

            recognition.onend = function () {
                micIcon.classList.remove('recording');
                inputDefecto.placeholder = 'Describa el defecto encontrado...';
            };

            // Evento click del botón
            btnDictado.addEventListener('click', () => {
                if (micIcon.classList.contains('recording')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });
        } else {
            console.warn("La Web Speech API no es soportada por este navegador. El dictado por voz está deshabilitado.");
            btnDictado.style.display = 'none'; // Se oculta el botón si no está soportado
        }

        // --- 3. LÓGICA DE ENVÍO DE FORMULARIO (fetch a Google Apps Script) ---
        const form = document.getElementById('qa-form');
        const btnSubmit = document.getElementById('btn-submit');
        const statusMessage = document.getElementById('status-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita recargar la página

            // Estado visual: Guardando...
            const originalContent = btnSubmit.innerHTML;
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Guardando...
            `;
            btnSubmit.classList.add('opacity-80', 'cursor-not-allowed');
            statusMessage.classList.add('hidden', 'opacity-0');

            // Preparar el cuerpo con los datos
            const formData = {
                lote: document.getElementById('lote').value,
                tipoTela: document.getElementById('tipoTela').value,
                defecto: document.getElementById('defecto').value,
                severidad: document.getElementById('severidad').value,
                usuario: document.getElementById('usuario').value
            };

            try {
                // Hacer la petición POST a Apps Script con mode: 'no-cors'
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8' // Recomendado para no-cors
                    },
                    body: JSON.stringify(formData)
                });

                // Debido a 'no-cors', no podemos leer la respuesta real. Asumimos éxito si no hay error de red.
                mostrarMensaje('¡Registro guardado exitosamente!', 'text-green-600');

                // Limpiar el formulario para un nuevo ingreso
                form.reset();

            } catch (error) {
                console.error("Error al enviar el formulario:", error);
                mostrarMensaje('Hubo un error al guardar. Verifica tu conexión.', 'text-red-500');
            } finally {
                // Restaurar el botón original
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = originalContent;
                btnSubmit.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        });

        // Utilidad para mostrar el mensaje de estado por 4 segundos
        let resetMsgTimeout;
        function mostrarMensaje(texto, colorClass) {
            clearTimeout(resetMsgTimeout);

            // Limpiar clases de color anteriores
            statusMessage.classList.remove('text-green-600', 'text-red-500');

            statusMessage.textContent = texto;
            statusMessage.classList.add(colorClass);
            statusMessage.classList.remove('hidden');

            // Pequeño retardo para la animación opacity
            setTimeout(() => {
                statusMessage.classList.remove('opacity-0');
            }, 50);

            // Ocultar a los 4 segundos
            resetMsgTimeout = setTimeout(() => {
                statusMessage.classList.add('opacity-0');
                setTimeout(() => statusMessage.classList.add('hidden'), 300); // Dar tiempo a la transición css
            }, 4000);
        }
    </script>
</body>

</html>
